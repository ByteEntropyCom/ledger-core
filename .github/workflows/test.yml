name: Integrity Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Opt into the new Node.js 24 runner for all actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: ledger_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password123
        ports:
          - 5432:5432
        # Use the Entrypoint override to pass postgres-specific flags safely
        options: >-
          --health-cmd "pg_isready -U postgres -d ledger_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --entrypoint docker-entrypoint.sh
        # This sends the flags to the postgres binary, not the docker engine
        args: ["postgres", "-c", "shared_preload_libraries=pg_cron", "-c", "cron.database_name=ledger_db"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # This will now run on Node 24 due to env var

      - name: Install PostgreSQL Client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run Migrations
        env:
          PGPASSWORD: password123
        run: |
          for file in db/migration/V*.sql; do
            echo "Applying $file..."
            psql -h localhost -U postgres -d ledger_db -f "$file" || exit 1
          done

      - name: Execute Integrity Test Suite
        env:
          PGPASSWORD: password123
        run: |
          psql -h localhost -U postgres -d ledger_db -f tests/integrity_suite.sql > test_output.log 2>&1
          cat test_output.log
          
          # Success check: Must see PASSED and NOT see "Failed"
          if grep -q "PASSED" test_output.log && ! grep -q "Failed" test_output.log; then
            echo "✅ Ledger Integrity Confirmed."
            exit 0
          else
            echo "❌ Ledger Integrity Check Failed."
            exit 1
          fi
